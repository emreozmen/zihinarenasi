workflows:
  unity-ios-workflow:
    name: ZihinArenasi iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - unity_credentials
        - ios_credentials
      vars:
        UNITY_VERSION: 6000.4.5f1
        UNITY_VERSION_CHANGESET: cc83ebd631f8
        BUNDLE_ID: com.zihinarenasi.zihinarenasi
        XCODE_WORKSPACE: Unity-iPhone.xcworkspace
        XCODE_SCHEME: Unity-iPhone
        DEVELOPMENT_TEAM: H66NL7YDHZ
    scripts:
      - name: Install Unity
        script: |
          # Find Unity Hub executable
          UNITY_HUB_PATH=$(find /Applications -name "Unity Hub" -type f 2>/dev/null | head -1)
          echo "Unity Hub found at: $UNITY_HUB_PATH"

          # Install Unity editor (arm64 for Apple Silicon / mac_mini_m2)
          "$UNITY_HUB_PATH" -- --headless install \
            --version $UNITY_VERSION \
            --changeset $UNITY_VERSION_CHANGESET \
            --architecture arm64

          # Install iOS module
          "$UNITY_HUB_PATH" -- --headless install-modules \
            --version $UNITY_VERSION \
            --module ios \
            --architecture arm64

          # Find actual Unity installation path
          echo "=== Searching for Unity installation ==="
          find /Applications/Unity -name "Unity" -type f 2>/dev/null || echo "Not found in /Applications/Unity"
          ls /Applications/Unity/Hub/Editor/ 2>/dev/null || echo "Editor dir not found"

          echo "UNITY_HOME=/Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity.app" >> $CM_ENV
      - name: Activate Unity License
        script: |
          echo "$UNITY_LICENSE" > /tmp/Unity_lic.ulf
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -manualLicenseFile /tmp/Unity_lic.ulf \
            || true
      - name: Build Unity iOS
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -logFile /dev/stdout \
            -projectPath . \
            -buildTarget iOS \
            -executeMethod BuildScript.BuildIOS \
            -nographics
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build Xcode project
        script: |
          xcode-project build-ipa \
            --workspace ios/Unity-iPhone.xcworkspace \
            --scheme Unity-iPhone \
            --xcargs "DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true