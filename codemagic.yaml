workflows:
  upload-to-appstore:
    name: Upload IPA to App Store
    max_build_duration: 30
    instance_type: mac_mini_m2
    environment:
      groups:
        - ios_credentials
    scripts:
      - name: Download IPA from GitHub Release
        script: |
          curl -L -o /tmp/ZihinArenasi.ipa \
            "https://github.com/emreozmen/zihinarenasi/releases/download/v1.1/ZihinArenasi.ipa"
          echo "IPA size: $(du -sh /tmp/ZihinArenasi.ipa)"
      - name: Upload to App Store Connect
        script: |
          mkdir -p build/ios/ipa
          cp /tmp/ZihinArenasi.ipa build/ios/ipa/ZihinArenasi.ipa

          # Write key to file (avoids newline issues with env vars)
          echo "$APP_STORE_CONNECT_PUBLISHER_PRIVATE_KEY" > /tmp/asc_key.p8

          app-store-connect publish \
            --path /tmp/ZihinArenasi.ipa \
            --key-id "5JLL2SWQ5R" \
            --issuer-id "00c1785c-9b7f-4c9e-ba01-2aa8b8e9ac9a" \
            --private-key @file:/tmp/asc_key.p8 \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa

  unity-ios-workflow:
    name: ZihinArenasi iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - unity_credentials
        - ios_credentials
      vars:
        UNITY_VERSION: 6000.4.5f1
        UNITY_VERSION_CHANGESET: cc83ebd631f8
        BUNDLE_ID: com.zihinarenasi.zihinarenasi
        XCODE_WORKSPACE: Unity-iPhone.xcworkspace
        XCODE_SCHEME: Unity-iPhone
        DEVELOPMENT_TEAM: H66NL7YDHZ
    scripts:
      - name: Install Unity
        script: |
          # Find Unity Hub executable
          UNITY_HUB_PATH=$(find /Applications -name "Unity Hub" -type f 2>/dev/null | head -1)
          echo "Unity Hub found at: $UNITY_HUB_PATH"

          # Install Unity editor (arm64 for Apple Silicon / mac_mini_m2)
          "$UNITY_HUB_PATH" -- --headless install \
            --version $UNITY_VERSION \
            --changeset $UNITY_VERSION_CHANGESET \
            --architecture arm64

          # Install iOS module
          "$UNITY_HUB_PATH" -- --headless install-modules \
            --version $UNITY_VERSION \
            --module ios \
            --architecture arm64

          # Find actual Unity installation path dynamically
          echo "=== Searching for Unity installation ==="
          ls /Applications/Unity/Hub/Editor/ 2>/dev/null || echo "Editor dir not found"
          FOUND_UNITY=$(find /Applications/Unity/Hub/Editor -name "Unity" -type f 2>/dev/null | head -1)
          echo "Found Unity at: $FOUND_UNITY"

          UNITY_APP_PATH="/Applications/Unity/Hub/Editor/$UNITY_VERSION/Unity.app"
          echo "UNITY_HOME=$UNITY_APP_PATH" >> $CM_ENV
      - name: Activate Unity License
        script: |
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -nographics \
            -quit \
            -logFile /tmp/unity_activate.log \
            -username "$UNITY_EMAIL" \
            -password "$UNITY_PASSWORD" \
            || true
          cat /tmp/unity_activate.log || true
      - name: Build Unity iOS
        script: |
          echo "=== Working directory ==="
          pwd
          echo "=== Project files ==="
          ls -la
          echo "=== Running Unity build ==="
          $UNITY_HOME/Contents/MacOS/Unity \
            -batchmode \
            -quit \
            -logFile /tmp/unity_build.log \
            -projectPath . \
            -buildTarget iOS \
            -executeMethod BuildScript.BuildIOS \
            -nographics
          BUILD_EXIT=$?
          echo "=== Unity exit code: $BUILD_EXIT ==="
          echo "=== Unity build log ==="
          cat /tmp/unity_build.log || echo "No log file found"
          echo "=== Output directory ==="
          ls -la ios/ 2>/dev/null || echo "ios/ not created"
          exit $BUILD_EXIT
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build Xcode project
        script: |
          echo "=== Listing ios/ directory ==="
          ls -la ios/ || echo "ios/ not found"
          echo "=== Finding .xcworkspace files ==="
          find . -name "*.xcworkspace" -not -path "*/.*" 2>/dev/null
          echo "=== Finding .xcodeproj files ==="
          find . -name "*.xcodeproj" -not -path "*/.*" 2>/dev/null

          xcode-project build-ipa \
            --workspace ios/Unity-iPhone.xcworkspace \
            --scheme Unity-iPhone \
            --xcargs "DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - /tmp/unity_activate.log
      - /tmp/unity_build.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true